<script>
// Garmin read helpers (inline — niente file separato)
(function() {
  const url = () => (localStorage.getItem('garmin_backend_url') || '').replace(/\/+$/, '');
  async function get(path) {
    const u = url(); if (!u) return null;
    try { const r = await fetch(u + path); if (!r.ok) return null; return await r.json(); } catch { return null; }
  }
  window.fetchGarminActivities = async (limit = 20) => (await get('/activities?limit=' + limit))?.activities || [];
  window.fetchGarminWellnessToday = async () => (await get('/wellness/today'))?.data || null;
  window.fetchGarminTrainingStatus = async () => (await get('/training-status'))?.data || null;
  window.mergeActivities = (s = [], g = []) => {
    const out = [...s];
    for (const x of g) {
      const t = new Date(x.start_date).getTime();
      if (!isFinite(t)) continue;
      if (!s.find(y => Math.abs(new Date(y.start_date).getTime() - t) < 30*60*1000)) out.push(x);
    }
    return out.sort((a, b) => new Date(b.start_date) - new Date(a.start_date));
  };
})();

// ─── Monkey-patch fetchActivities: merge automatico Strava + Garmin ─────────
// Tutti i grafici (Home/Progressi/Coach) ricevono dati combinati senza modifiche ai js/
setTimeout(function() {
  if (typeof window.fetchActivities !== 'function' || window.__fetchActivitiesPatched) return;
  const orig = window.fetchActivities;
  window.fetchActivities = async function(auth, perPage) {
    const stravaActs = await orig(auth, perPage).catch(() => []);
    try {
      const garminActs = await window.fetchGarminActivities(perPage || 30);
      return window.mergeActivities(stravaActs || [], garminActs || []);
    } catch (e) {
      return stravaActs || [];
    }
  };
  window.__fetchActivitiesPatched = true;
  console.log('[RunCoach] fetchActivities patched: Strava + Garmin merge active');
}, 2000);
</script>

class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  componentDidCatch(err, info) { this.setState({ err, info }); console.error('UI crash:', err, info); }
  render() {
    if (this.state.err) {
      return (
        <div style={{ padding:'24px 18px', color:'#fff', overflow:'auto', minHeight:'100%' }}>
          <div style={{ color:'#FF4422', fontSize:13, fontWeight:700, letterSpacing:'0.16em', marginBottom:10 }}>OPS · CRASH UI</div>
          <div style={{ color:'#FFD24E', fontSize:14, fontWeight:600, marginBottom:8, wordBreak:'break-word' }}>{this.state.err.message || String(this.state.err)}</div>
          <pre style={{ color:'#ccc', fontSize:11, whiteSpace:'pre-wrap', wordBreak:'break-word', background:'rgba(255,255,255,0.04)', padding:12, borderRadius:8, lineHeight:1.45 }}>
            {this.state.err.stack || ''}
            {'\n\n— Componente —\n' + (this.state.info?.componentStack || '')}
          </pre>
          <button onClick={() => { localStorage.clear(); location.reload(); }} style={{ marginTop:14, padding:'10px 16px', background:'#FF4422', color:'#fff', border:'none', borderRadius:10, fontSize:13, fontWeight:700, cursor:'pointer' }}>
            Reset app + reload
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('rca_mobile') || '{}'); } catch { return {}; } })();
  const [screen, setScreen]           = useState(saved.screen || 'home');
  const [workoutData, setWorkoutData] = useState(null);
  const [tweaks, setTweaks]           = useState({ ...TWEAK_DEFAULTS, ...(saved.tweaks || {}) });
  const [tweaksVisible, setTweaksVisible] = useState(false);

  // Strava auth state
  const [authState, setAuthState] = useState('checking'); // checking | login | setup | callback | authenticated
  const [stravaAuth, setStravaAuth] = useState(null);
  const [oauthCode, setOauthCode]   = useState(null);

  useEffect(() => {
    localStorage.setItem('rca_mobile', JSON.stringify({ screen, tweaks }));
  }, [screen, tweaks]);

  useEffect(() => {
    // Hide splash
    setTimeout(() => {
      const s = document.getElementById('splash');
      if (s) s.classList.add('hidden');
    }, 700);

    // Tweaks protocol
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    // Check OAuth callback code in URL
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      setOauthCode(code);
      setAuthState('callback');
      return () => window.removeEventListener('message', handler);
    }

    // Check stored auth
    getValidAuth().then(auth => {
      if (auth) { setStravaAuth(auth); setAuthState('authenticated'); }
      else       { setAuthState('login'); }
    });

    return () => window.removeEventListener('message', handler);
  }, []);

  const handleTweakChange = (key, val) => {
    setTweaks(p => ({ ...p, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const handleAuthDone = (auth) => {
    setStravaAuth(auth);
    setAuthState('authenticated');
  };

  const handleLogout = () => {
    StravaAuth.clear();
    setStravaAuth(null);
    setAuthState('login');
  };

  const navTo = (target, data) => {
    if (target === 'workout' && data) setWorkoutData(data);
    setScreen(target);
  };

  // Auth screens (no bottom nav)
  if (authState === 'checking') {
    return (
      <div style={{ height:'100%', background:'#06060E', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ width:40, height:40, borderRadius:20, border:'3px solid #FC4C02', borderTopColor:'transparent', animation:'spin 0.8s linear infinite' }}/>

  const showNav = !['workout','garmin','race-settings'].includes(screen);

}

  // Carica stato Strava + race ad OGNI open (così ogni generazione ha dati freschi)
  useEffect(() => {
    if (!open) return;

      const out = { ctl: 0, atl: 0, tsb: 0, daysToRace: null, weeklyKm: tweaks?.weeklyKm || 25, recentRuns: [], garmin: null, pbs: null, vdotPaces: null, raceName: null, raceDate: null };
      try {
        // Race date
        const iso = (typeof window.USER === 'object' && (window.USER.raceDateISO || window.USER.raceDate)) || tweaks?.raceDate;
        if (iso && /^\d{4}-\d{2}-\d{2}/.test(iso)) {
          const d = new Date(iso.slice(0,10) + 'T12:00:00');
          out.daysToRace = Math.max(0, Math.ceil((d - new Date()) / 86400000));
        }
        // Strava
        if (typeof window.getValidAuth === 'function' && typeof window.fetchActivities === 'function') {
          const auth = await window.getValidAuth();
          if (auth) {
            const acts = await window.fetchActivities(auth, 60).catch(() => []);
            if (Array.isArray(acts) && acts.length && typeof window.activitiesToTrainingData === 'function') {
              const td = window.activitiesToTrainingData(acts);
              if (typeof window.calculateTrainingLoad === 'function') {
                const lh = window.calculateTrainingLoad(td, 60);
                const last = lh[lh.length - 1] || {};
                out.ctl = Math.round(+last.ctl || 0);
                out.atl = Math.round(+last.atl || 0);
                out.tsb = Math.round(+last.tsb || 0);
              }
              const now = Date.now();
              const last28 = td.filter(a => (now - new Date(a.date).getTime()) <= 28*86400000);
              if (last28.length) out.weeklyKm = +(last28.reduce((s,a) => s + (+a.distance_km||0), 0) / 4).toFixed(1);
              out.recentRuns = td.slice(-5).reverse().map(a => {
                const km = +a.distance_km || 0;
                const paceSec = a.avg_pace_sec_km;
                const pace = paceSec ? `${Math.floor(paceSec/60)}:${String(Math.round(paceSec%60)).padStart(2,'0')}/km` : '—';
                const dt = new Date(a.date);
                const dStr = isFinite(dt) ? `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}` : '—';
                return `${dStr}: ${km.toFixed(1)}km @ ${pace}${a.avg_hr ? ' · ' + Math.round(a.avg_hr) + 'bpm' : ''}`;
              });
              // PB calcolati dai dati Strava+Garmin merged
              if (typeof window.computePBsFromActivities === 'function') {
                const pbs = window.computePBsFromActivities(acts, null);
                if (pbs) {
                  out.pbs = pbs;
                  // Calcola ritmi VDOT-based da PB più recenti (preferenza 10K > 21K > 5K)
                  if (typeof window.calculateVDOT === 'function' && typeof window.predictTimeFromVDOT === 'function') {
                    const candidates = [
                      ['10k', 10000, pbs['10k']?.seconds],
                      ['21k', 21097, pbs['21k']?.seconds],
                      ['5k',  5000,  pbs['5k']?.seconds],
                    ].filter(c => c[2]);
                    if (candidates.length) {
                      let bestVdot = 0;
                      for (const [k, dist, sec] of candidates) {
                        const v = window.calculateVDOT(dist, sec);
                        if (v > bestVdot) bestVdot = v;
                      }
                      if (bestVdot > 0) {
                        const raceP   = Math.round(window.predictTimeFromVDOT(bestVdot, 21097) / 21.097);
                        const tempoP  = Math.max(raceP - 15, 240);
                        const vo2P    = Math.max(raceP - 60, 200);
                        const easyP   = raceP + 50;
                        const longP   = raceP + 35;
                        const fmt = s => `${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,'0')}`;
                        out.vdotPaces = { vdot: bestVdot, race: fmt(raceP), tempo: fmt(tempoP), vo2: fmt(vo2P), easy: fmt(easyP), long: fmt(longP) };
                      }
                    }
                  }
                }
              }
            }
          }

              <input type="range" min={1} max={10} value={feel} onChange={e => setFeel(+e.target.value)} style={{ width:'100%', accentColor: accent }}/>
              <div style={{ display:'flex', justifyContent:'space-between', color:'#666', fontSize:10, marginTop:4 }}>
                <span>stanco</span><span>medio</span><span>brillante</span>
              </div>
            </div>

            <div style={{ marginBottom: 14 }}>
              <div style={{ color:'#aaa', fontSize:11, fontWeight:700, letterSpacing:'0.08em', marginBottom: 8 }}>TEMPO DISPONIBILE</div>
              <div style={{ display:'flex', gap: 6 }}>
                {[30, 45, 60, 75, 90, 120].map(m => (
                  <button key={m} onClick={() => setMinutes(m)} style={{
                    flex:1, padding:'10px 0', border: m===minutes ? `1.5px solid ${accent}` : '1px solid rgba(255,255,255,0.1)',
                    background: m===minutes ? `${accent}22` : 'rgba(255,255,255,0.03)', color: m===minutes ? accent : '#ddd',
                    fontWeight: m===minutes ? 800 : 500, fontSize: 13, borderRadius: 10, cursor:'pointer',
                  }}>{m}<span style={{ fontSize:9, opacity:0.6 }}>min</span></button>
                ))}
              </div>
            </div>

            <div style={{ marginBottom: 18 }}>
              <div style={{ color:'#aaa', fontSize:11, fontWeight:700, letterSpacing:'0.08em', marginBottom: 8 }}>TIPO</div>
              <div style={{ display:'flex', gap: 6, flexWrap:'wrap' }}>
                {[['auto','Decide il coach','🤖'],['easy','Easy','🟢'],['tempo','Tempo','🟡'],['intervals','Intervalli','🔴'],['long','Lungo','🔵']].map(([k, l, e]) => (
                  <button key={k} onClick={() => setType(k)} style={{
                    flex:'1 1 28%', padding:'10px 6px',
                    border: k===type ? `1.5px solid ${accent}` : '1px solid rgba(255,255,255,0.1)',
                    background: k===type ? `${accent}22` : 'rgba(255,255,255,0.03)',
                    color: k===type ? accent : '#ddd', fontWeight: k===type ? 700 : 500, fontSize: 12, borderRadius: 10, cursor:'pointer',
                  }}>{e} {l}</button>
                ))}
              </div>
            </div>

            <button onClick={generate} disabled={loading} style={{
              width:'100%', height: 52, background: loading ? '#444' : `linear-gradient(135deg, ${accent}, #C73015)`,
              border:'none', color:'#fff', fontWeight: 800, fontSize: 14, letterSpacing:'0.05em',
              borderRadius: 14, cursor: loading ? 'wait' : 'pointer',
              boxShadow: loading ? 'none' : `0 6px 18px rgba(255,68,34,0.4)`,
            }}>{loading ? '✨ generazione in corso…' : '✨ GENERA ALLENAMENTO'}</button>
          </div>
        )}

        {workout && <WorkoutResult workout={workout} err={err} scheduleDate={scheduleDate} setScheduleDate={setScheduleDate} onRegen={() => setWorkout(null)} accent={accent}/>}
      </div>
    </div>
  );
}

// ─── Risultato workout: visualizza Garmin-style + azioni ────────────────────
function WorkoutResult({ workout, err, scheduleDate, setScheduleDate, onRegen, accent }) {
  const [savedMsg, setSavedMsg] = useState(null);
  const steps = workout.garmin_steps || [];

  const expandSteps = () => {
    const out = [];
    steps.forEach((s, i) => {
      const rep = s.repeat || 1;
      for (let r = 0; r < rep; r++) {
        out.push({ ...s, idx: out.length + 1, repNum: rep > 1 ? r + 1 : null, repTotal: rep > 1 ? rep : null });
      }
    });
    return out;
  };
  const flat = expandSteps();

  const buildTcx = () => {
    const stepsXml = flat.map((s, i) => {
      const durType = s.duration_type === 'time' ? 'Time_t' : 'Distance_t';
      const durTag  = s.duration_type === 'time'
        ? `<Seconds>${s.duration_value}</Seconds>`
        : `<Meters>${s.duration_value}</Meters>`;
      const intensity = s.phase === 'warmup' ? 'Warmup' : s.phase === 'cooldown' ? 'Cooldown' : s.phase === 'recovery' ? 'Rest' : 'Active';
      let target = '<Target xsi:type="None_t"/>';
      if (s.target_type === 'pace' && s.pace_min && s.pace_max) {
        const toMs = (str) => { const [m, sec] = str.split(':').map(Number); const sk = m*60+(sec||0); return sk > 0 ? 1000/sk : 0; };
        const hi = toMs(s.pace_min), lo = toMs(s.pace_max);
        target = `<Target xsi:type="Speed_t"><SpeedZone xsi:type="CustomSpeedZone_t"><LowInMetersPerSecond>${Math.min(lo,hi).toFixed(4)}</LowInMetersPerSecond><HighInMetersPerSecond>${Math.max(lo,hi).toFixed(4)}</HighInMetersPerSecond></SpeedZone></Target>`;
      }
      return `<Step xsi:type="Step_t"><StepId>${i+1}</StepId><Name>${(s.desc||'Step').replace(/[<>&]/g,'')}</Name><Duration xsi:type="${durType}">${durTag}</Duration><Intensity>${intensity}</Intensity>${target}</Step>`;
    }).join('');
    return `<?xml version="1.0" encoding="UTF-8"?>\n<TrainingCenterDatabase xmlns="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><Workouts><Workout Sport="Running"><Name>${(workout.title||'Workout').replace(/[<>&]/g,'').slice(0,15)}</Name>${stepsXml}</Workout></Workouts></TrainingCenterDatabase>`;
  };

  const downloadTCX = () => {
    const blob = new Blob([buildTcx()], { type:'application/vnd.garmin.tcx+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = (workout.title||'workout').replace(/\s+/g,'_') + '.tcx'; a.click();
    URL.revokeObjectURL(url);
    setSavedMsg('File .tcx scaricato — importalo su Garmin Connect → Allenamenti → Importa');
  };

  const saveToPlan = () => {
    try {
      const plan = JSON.parse(localStorage.getItem('rc_userPlan') || '{}');
      plan[scheduleDate] = { ...workout, savedAt: new Date().toISOString() };
      localStorage.setItem('rc_userPlan', JSON.stringify(plan));
      setSavedMsg(`Salvato per ${new Date(scheduleDate).toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long' })}`);
    } catch (e) { setSavedMsg('Errore salvataggio'); }
  };

  const buildBackendPayload = () => {
    const paceToMs = (str) => {
      if (!str) return null;
      const [m, s] = str.split(':').map(Number);
      const sk = m*60 + (s||0);
      return sk > 0 ? +(1000/sk).toFixed(4) : null;
    };
    const steps = [];
    flat.forEach(s => {
      let duration = 'OPEN';
      if (s.duration_type === 'time' && s.duration_value) duration = `TIME:${s.duration_value}`;
      else if (s.duration_type === 'distance' && s.duration_value) duration = `DISTANCE:${s.duration_value}`;
      let tt = 'open', tlow = null, thigh = null;
      if (s.target_type === 'pace' && s.pace_min && s.pace_max) {
        tt = 'pace';
        const a = paceToMs(s.pace_min), b = paceToMs(s.pace_max);
        if (a && b) { tlow = Math.min(a,b); thigh = Math.max(a,b); }
      } else if (s.target_type === 'hr' && s.hr_min && s.hr_max) {
        tt = 'hr'; tlow = +s.hr_min; thigh = +s.hr_max;
      }
      steps.push({ type: s.phase || 'interval', duration, target_type: tt, target_low: tlow, target_high: thigh, note: s.desc || '' });
    });
    return {
      name: (workout.title || 'AI Workout').slice(0, 60),
      description: workout.rationale || '',
      sport_type: 'running',
      steps,
      schedule_date: scheduleDate || null,
    };
  };

  const [garminLoading, setGarminLoading] = useState(false);
  const pushToGarmin = async () => {
    const url = (localStorage.getItem('garmin_backend_url') || '').replace(/\/+$/, '');
    if (!url) {
      setSavedMsg('⚠ Backend Garmin non configurato. Vai in Allenamenti → Configura push diretto.');
      return;
    }
    setGarminLoading(true); setSavedMsg(null);
    try {
      const res = await fetch(`${url}/upload-workout`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(buildBackendPayload()),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const detail = data.detail;
        const msg = typeof detail === 'string' ? detail : (detail?.message || `HTTP ${res.status}`);
        throw new Error(msg);
      }
      setSavedMsg(data.scheduled
        ? `✓ Inviato a Garmin Connect e schedulato per ${new Date(data.schedule_date).toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long' })}`
        : '✓ Inviato a Garmin Connect (lo trovi in "I miei allenamenti")');
    } catch (e) {
      setSavedMsg('⚠ Push Garmin fallito: ' + (e.message || 'errore sconosciuto'));
    }
    setGarminLoading(false);
  };

  return (
    <>
      {err && <div style={{ background:'#3a1515', color:'#ff9a9a', padding:'8px 12px', borderRadius:8, fontSize:11, marginBottom:12 }}>⚠ {err}</div>}
      <div style={{ background:'rgba(255,255,255,0.04)', borderRadius:14, padding:14, marginBottom:12 }}>
        <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:10 }}>
          {workout.type && <span style={{ background: `${accent}22`, color: accent, fontSize:10, fontWeight:800, padding:'4px 10px', borderRadius:6, letterSpacing:'0.06em' }}>{workout.type.toUpperCase()}</span>}
          {workout.distance_km != null && <span style={{ background:'rgba(255,255,255,0.06)', color:'#fff', fontSize:11, fontWeight:700, padding:'4px 10px', borderRadius:6 }}>{workout.distance_km} km</span>}
          {workout.duration_min != null && <span style={{ background:'rgba(255,255,255,0.06)', color:'#fff', fontSize:11, fontWeight:700, padding:'4px 10px', borderRadius:6 }}>{workout.duration_min} min</span>}
          {workout.rpe && <span style={{ background:'rgba(255,255,255,0.06)', color:'#aaa', fontSize:11, padding:'4px 10px', borderRadius:6 }}>RPE {workout.rpe}</span>}
        </div>
        {workout.rationale && <div style={{ color:'#bbb', fontSize:12, lineHeight:1.5, fontStyle:'italic', marginBottom:10, padding:'8px 10px', background:'rgba(255,68,34,0.06)', borderLeft:`2px solid ${accent}`, borderRadius:4 }}>{workout.rationale}</div>}

        {flat.length > 0 && (
          <div style={{ marginTop:8 }}>
            <div style={{ color:'#888', fontSize:10, fontWeight:700, letterSpacing:'0.08em', marginBottom:6 }}>GARMIN WORKOUT</div>
            {flat.map((s, i) => {
              const phaseColors = { warmup:'#00CFA8', interval: accent, recovery:'#4D9EFF', cooldown:'#00CFA8' };
              const col = phaseColors[s.phase] || '#888';
              const durStr = s.duration_type === 'time'
                ? `${Math.round(s.duration_value/60*10)/10} min`
                : s.duration_type === 'distance' ? `${(s.duration_value/1000).toFixed(2)} km` : 'lap';
              return (
                <div key={i} style={{ display:'flex', gap:8, padding:'6px 0', borderBottom: i < flat.length-1 ? '1px solid rgba(255,255,255,0.04)' : 'none' }}>
                  <div style={{ width:24, height:24, background:`${col}22`, color:col, borderRadius:6, fontSize:11, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>{i+1}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:'flex', alignItems:'baseline', gap:6, marginBottom:2 }}>
                      <span style={{ color: col, fontSize:10, fontWeight:800, textTransform:'uppercase', letterSpacing:'0.05em' }}>{s.phase}</span>
                      <span style={{ color:'#fff', fontSize:12, fontWeight:700 }}>{durStr}</span>
                      {s.target_type === 'pace' && s.pace_min && <span style={{ color: col, fontSize:11, fontWeight:700, marginLeft:'auto' }}>{s.pace_min}-{s.pace_max}/km</span>}
                      {s.target_type === 'hr' && s.hr_min && <span style={{ color: col, fontSize:11, fontWeight:700, marginLeft:'auto' }}>{s.hr_min}-{s.hr_max} bpm</span>}
                      {s.repNum && <span style={{ color:'#888', fontSize:10 }}>({s.repNum}/{s.repTotal})</span>}
                    </div>
                    {s.desc && <div style={{ color:'#999', fontSize:11, lineHeight:1.4 }}>{s.desc}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Schedule date */}
      <div style={{ background:'rgba(255,255,255,0.03)', borderRadius:12, padding:12, marginBottom:10 }}>
        <div style={{ color:'#888', fontSize:10, fontWeight:700, letterSpacing:'0.08em', marginBottom:6 }}>ASSEGNA A UNA DATA</div>
        <input type="date" value={scheduleDate} onChange={e => setScheduleDate(e.target.value)}
          style={{ width:'100%', height:42, padding:'0 12px', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:10, color:'#fff', fontSize:13, outline:'none', colorScheme:'dark' }}/>
      </div>

      {savedMsg && <div style={{ background:'rgba(0,207,168,0.1)', color:'#5fdca0', border:'1px solid rgba(0,207,168,0.3)', padding:'10px 12px', borderRadius:10, fontSize:12, marginBottom:10 }}>✓ {savedMsg}</div>}

      <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
        <button onClick={pushToGarmin} disabled={garminLoading} style={{ flex:'1 1 100%', padding:'14px 0', background: garminLoading ? '#444' : `linear-gradient(135deg, ${accent}, #C73015)`, border:'none', borderRadius:12, color:'#fff', fontWeight:800, fontSize:14, cursor: garminLoading ? 'wait' : 'pointer', letterSpacing:'0.04em', boxShadow: garminLoading ? 'none' : `0 6px 18px rgba(255,68,34,0.4)` }}>
          {garminLoading ? '⌚ invio in corso…' : '⌚ INVIA A GARMIN CONNECT'}
        </button>
        <button onClick={saveToPlan} style={{ flex:'1 1 100%', padding:'12px 0', background:'rgba(0,207,168,0.15)', border:'1px solid rgba(0,207,168,0.4)', borderRadius:12, color:'#00CFA8', fontWeight:700, fontSize:13, cursor:'pointer' }}>💾 Salva nel piano locale</button>
        <button onClick={downloadTCX} style={{ flex:'1 1 48%', padding:'12px 0', background:'rgba(77,158,255,0.15)', border:'1px solid rgba(77,158,255,0.4)', borderRadius:12, color:'#4D9EFF', fontWeight:700, fontSize:12, cursor:'pointer' }}>⬇ Scarica .TCX</button>
        <button onClick={onRegen} style={{ flex:'1 1 48%', padding:'12px 0', background:'rgba(255,255,255,0.06)', border:'none', borderRadius:12, color:'#fff', fontWeight:600, fontSize:12, cursor:'pointer' }}>↺ Rigenera</button>
      </div>
    </>
  );
}

// Fallback formula se AI fallisce
function formulaFallback(type, minutes, feel, state) {
  const tsb = state?.tsb || 0;
  const daysToRace = state?.daysToRace;
  // Forza easy se TSB basso o gara imminente
  if (tsb < -15 || (daysToRace !== null && daysToRace !== undefined && daysToRace <= 5)) type = 'easy';
  const km = Math.round(minutes / 6 * 10) / 10;
  const easyPace = '6:00';
  const tempoPace = '5:30';
  const intervalPace = '4:50';

  const presets = {
    easy: {
      title: `Easy ${km}km`, type:'easy',
      garmin_steps: [
        { phase:'warmup',   duration_type:'time', duration_value:300, target_type:'pace', pace_min:'6:30', pace_max:'7:00', desc:'Camminata + jogging' },
        { phase:'interval', duration_type:'time', duration_value:(minutes-10)*60, target_type:'pace', pace_min:'5:50', pace_max:'6:20', desc:'Corsa easy continua' },
        { phase:'cooldown', duration_type:'time', duration_value:300, target_type:'none', desc:'Defaticamento' },
      ],
    },
    tempo: {
      title:'Tempo run', type:'tempo',
      garmin_steps: [
        { phase:'warmup',   duration_type:'time', duration_value:720, target_type:'pace', pace_min:'6:30', pace_max:'7:00', desc:'Riscaldamento + 4 allunghi' },
        { phase:'interval', duration_type:'time', duration_value:(minutes-25)*60, target_type:'pace', pace_min:'5:20', pace_max:'5:35', desc:'Blocco a soglia' },
        { phase:'cooldown', duration_type:'time', duration_value:600, target_type:'pace', pace_min:'6:30', pace_max:'7:00', desc:'Defaticamento' },
      ],
    },
    intervals: {
      title:'5×1km VO2', type:'intervals',
      garmin_steps: [
        { phase:'warmup',   duration_type:'time', duration_value:900, target_type:'pace', pace_min:'6:30', pace_max:'7:00', desc:'Riscaldamento + allunghi' },
        { phase:'interval', duration_type:'distance', duration_value:1000, target_type:'pace', pace_min:'4:45', pace_max:'4:55', desc:'1km veloce', repeat:5 },
        { phase:'recovery', duration_type:'time', duration_value:120, target_type:'none', desc:'Jogging recupero', repeat:5 },
        { phase:'cooldown', duration_type:'time', duration_value:600, target_type:'pace', pace_min:'6:30', pace_max:'7:00', desc:'Defaticamento' },
      ],
    },
    long: {
      title:`Lungo ${Math.round(km*1.3)}km`, type:'long',
      garmin_steps: [
        { phase:'warmup',   duration_type:'time', duration_value:600, target_type:'pace', pace_min:'6:30', pace_max:'7:00', desc:'Avvio progressivo' },
        { phase:'interval', duration_type:'time', duration_value:(minutes-15)*60, target_type:'pace', pace_min:'5:50', pace_max:'6:20', desc:'Lungo continuo a passo conversazionale' },
        { phase:'cooldown', duration_type:'time', duration_value:300, target_type:'none', desc:'Cammino + stretching' },
      ],
    },
  };
  if (type === 'auto') type = tsb < -10 ? 'easy' : 'tempo';
  const pick = presets[type] || presets.easy;
  return { ...pick, distance_km: km, duration_min: minutes, rpe: feel < 6 ? '5/10' : '7/10', rationale: 'Workout fallback (AI non disponibile). Ritmi orientativi.' };
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
// PWA install prompt (Android Chrome) — iOS shows native "Add to Home Screen"
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      document.getElementById('install-banner').classList.remove('show');
    });
  }
});
document.getElementById('dismiss-btn').addEventListener('click', () => {
  document.getElementById('install-banner').classList.remove('show');
});

// Service Worker for offline support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    // Forza il check di un nuovo SW ad ogni apertura
    reg.update().catch(() => {});
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      if (!nw) return;
      nw.addEventListener('statechange', () => {
        if (nw.state === 'activated') {
          // Ricarica una volta sola per prendere il nuovo codice
          if (!sessionStorage.getItem('__sw_reloaded')) {
            sessionStorage.setItem('__sw_reloaded', '1');
            location.reload();
          }
        }
      });
    });
  }).catch(() => {});
  // Reload automatico quando un nuovo SW prende il controllo
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    if (!sessionStorage.getItem('__sw_reloaded')) {
      sessionStorage.setItem('__sw_reloaded', '1');
      location.reload();
    }
  });
}
</script>
